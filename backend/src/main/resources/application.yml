server:
  port: 8080

spring:
  application:
    name: boiler-management
  
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./boiler_management.db
  
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.boiler.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.boiler: debug
